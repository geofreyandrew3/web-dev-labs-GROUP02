<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Basic Contact Form</h2>
    <form>
        <label>Name</label><br>
        <input type="text" placeholder="Enter name"><br>
        <label>Email</label><br>
        <input type="email" placeholder="Enter email"><br>
        <label>Message</label><br>
        <textarea></textarea><br>
        <input type="button" value="Submit">
    </form>

    <h2>REGISTRATION FORM</h2>
    <table>
        <tr>
            <td>Full Name </td>
            <td><input type="text" required></td>
        </tr>
         <tr>
            <td>Email</td>
            <td><input type="email" required></td>
        </tr>
         <tr>
            <td>Password</td>
            <td><input type="password" required></td>
        </tr>
         <tr>
            <td>Gender</td>
            <td><input type="radio" name="Gender" value="Male"required>Male
                <td><input type="radio" name="Gender" value="Female"required>Female
            </td>
        </tr>
        <tr>
            <td>COURSES</td>
            <td><input type="checkbox" name="COURSES" value="html"required>html
            </td> <br>
            <td><input type="checkbox" name="COURSES" value="CSS"required>CSS
            </td> <br>
            <td><input type="checkbox" name="COURSES" value="Javascript"required>Javascript
            </td>
        </tr>
    </table>
    <input type="button" value="Submit">
</body>
</html>
